<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashApp Pay</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00D632;--green-dark:#00b82b;--green-glow:rgba(0,214,50,0.2);
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#ffffff;--muted:rgba(255,255,255,0.38);--muted2:rgba(255,255,255,0.55);
  --red:#ef4444;--mono:'Courier New',monospace;
}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:1.5rem 1rem;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,214,50,0.06) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

.card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:2rem 1.75rem 1.75rem;
  box-shadow:0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
}

/* Header */
.page-title{
  text-align:center;
  font-size:22px;font-weight:700;letter-spacing:-0.02em;
  margin-bottom:0.35rem;
}
.page-title span{color:var(--green)}
.page-sub{text-align:center;font-size:13px;color:var(--muted2);margin-bottom:1.75rem}

.divider{height:1px;background:var(--border);margin-bottom:1.75rem}

/* Amount display */
.amount-display{text-align:center;margin-bottom:1.5rem}
.amount-big{
  font-size:52px;font-weight:700;font-family:var(--mono);
  letter-spacing:-3px;line-height:1;color:var(--text);
  transition:color 0.2s;margin-bottom:2px;
}
.amount-big.active{color:var(--green)}

/* Input */
.field{margin-bottom:1rem}
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px}
.inp-wrap{position:relative}
.inp-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:600;color:var(--muted2);pointer-events:none}
input[type="number"],input[type="text"]{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:12px;
  padding:13px 14px 13px 34px;
  font-size:16px;color:var(--text);font-family:inherit;
  outline:none;transition:border-color 0.15s;
  -moz-appearance:textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{border-color:rgba(0,214,50,0.5);box-shadow:0 0 0 3px rgba(0,214,50,0.08)}
input::placeholder{color:var(--muted)}

/* Quick amounts */
.quick-row{display:flex;gap:8px;margin-bottom:1.25rem}
.q-btn{
  flex:1;padding:9px 4px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;font-size:13px;font-weight:500;
  color:var(--muted2);cursor:pointer;text-align:center;
  transition:all 0.12s;
}
.q-btn:hover{border-color:rgba(0,214,50,0.4);color:var(--green)}
.q-btn.sel{background:rgba(0,214,50,0.1);border-color:var(--green);color:var(--green)}

/* Pay button */
.pay-btn{
  width:100%;padding:15px;
  background:var(--green);border:none;border-radius:12px;
  font-size:16px;font-weight:700;color:#000;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.15s;letter-spacing:-0.01em;
  box-shadow:0 4px 24px var(--green-glow);
  margin-top:0.25rem;
}
.pay-btn:hover{background:var(--green-dark);transform:translateY(-1px);box-shadow:0 8px 32px var(--green-glow)}
.pay-btn:active{transform:translateY(0) scale(0.985)}
.pay-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.cashapp-icon{font-size:20px}

/* ── RESULT STATE ── */
.result-card{display:none;flex-direction:column;align-items:center;gap:1.25rem}
.result-card.show{display:flex}

.result-header{text-align:center}
.result-title{font-size:16px;font-weight:600;margin-bottom:4px}
.result-amt{font-size:13px;color:var(--muted2)}

.qr-container{
  background:#fff;border-radius:16px;
  padding:16px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.qr-container canvas,.qr-container img{display:block !important;width:200px !important;height:200px !important}

.cashapp-btn{
  width:100%;padding:15px;
  background:var(--green);border:none;border-radius:12px;
  font-size:16px;font-weight:700;color:#000;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.15s;
  box-shadow:0 4px 24px var(--green-glow);
  text-decoration:none;
}
.cashapp-btn:hover{background:var(--green-dark);transform:translateY(-1px)}
.cashapp-btn:active{transform:scale(0.985)}

.expiry-row{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--muted);
}
.expiry-val{font-family:var(--mono);color:var(--green);font-weight:600}
.expiry-val.urgent{color:var(--red)}

.new-btn{
  background:transparent;border:1px solid var(--border2);
  border-radius:10px;padding:9px 20px;
  font-size:13px;color:var(--muted2);cursor:pointer;
  transition:all 0.12s;width:100%;
}
.new-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}

/* Loading */
.loading-wrap{display:none;flex-direction:column;align-items:center;gap:14px;padding:1rem 0}
.loading-wrap.show{display:flex}
.spinner{width:36px;height:36px;border:2.5px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--muted2)}

/* Error */
.error-box{display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:#fca5a5;line-height:1.5;margin-top:10px;font-family:var(--mono);word-break:break-word}
.error-box.show{display:block}
</style>
</head>
<body>

<div class="card">

  <!-- INPUT STATE -->
  <div id="input-state">
    <div class="page-title">$<span>Cash</span>App Pay</div>
    <div class="divider"></div>

    <div class="amount-display">
      <div class="amount-big" id="disp-amt">$0</div>
    </div>

    <div class="field">
      <div class="field-label">Amount (USD)</div>
      <div class="inp-wrap">
        <span class="inp-prefix">$</span>
        <input type="number" id="inp-usd" placeholder="0.00" min="0.01" step="0.01" oninput="updateAmt(this.value)">
      </div>
    </div>

    <div class="quick-row">
      <div class="q-btn" onclick="setQ(this,5)">$5</div>
      <div class="q-btn" onclick="setQ(this,10)">$10</div>
      <div class="q-btn" onclick="setQ(this,25)">$25</div>
      <div class="q-btn" onclick="setQ(this,50)">$50</div>
    </div>

    <div class="field">
      <div class="field-label">Comments (optional)</div>
      <div class="inp-wrap">
        <span class="inp-prefix" style="font-size:14px;color:var(--muted)">💬</span>
        <input type="text" id="inp-desc" placeholder="Add a comment...">
      </div>
    </div>

    <div class="loading-wrap" id="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-txt">Generating invoice...</div>
    </div>

    <button class="pay-btn" id="pay-btn" onclick="generate()">
      <span class="cashapp-icon">$</span>
      PAY WITH CASHAPP
    </button>

    <div class="error-box" id="error-box"></div>
  </div>

  <!-- RESULT STATE -->
  <div class="result-card" id="result-state">
    <div class="result-header">
      <div class="result-title">Scan to pay</div>
      <div class="result-amt" id="r-amt"></div>
    </div>

    <div class="qr-container" id="qr-wrap"></div>

    <div class="expiry-row">
      ⏱ Expires in <span class="expiry-val" id="expiry-cd">10:00</span>
    </div>

    <a class="cashapp-btn" id="cashapp-link" href="#" target="_blank">
      <span style="font-size:20px">$</span>
      Open in Cash App
    </a>

    <button class="new-btn" onclick="resetPage()">← New payment</button>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────
var LNBITS_URL  = 'https://demo.lnbits.com';
var INVOICE_KEY = 'f1abb39ab1ba422790060baec6b6f9a5';
var EXPIRY_SECS = 600;
// ────────────────────────────────────────────

var btcPrice    = 97500;
var expiryTimer = null;
var expiryEnd   = 0;
var currentLink = '';

async function fetchBtcPrice() {
  try {
    var res  = await fetch('https://mempool.space/api/v1/prices');
    var data = await res.json();
    btcPrice = data.USD || 97500;
  } catch(e) { btcPrice = 97500; }
}

function usdToSats(usd) {
  return Math.round((parseFloat(usd) / btcPrice) * 100000000);
}

function updateAmt(v) {
  var n  = parseFloat(v) || 0;
  var el = document.getElementById('disp-amt');
  el.textContent = n > 0
    ? '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 })
    : '$0';
  el.className = 'amount-big' + (n > 0 ? ' active' : '');
}

function setQ(el, v) {
  document.querySelectorAll('.q-btn').forEach(function(b) { b.classList.remove('sel'); });
  el.classList.add('sel');
  document.getElementById('inp-usd').value = v;
  updateAmt(v);
}

async function generate() {
  var usd  = parseFloat(document.getElementById('inp-usd').value);
  var desc = document.getElementById('inp-desc').value.trim() || 'CashApp Payment';
  var err  = document.getElementById('error-box');

  err.classList.remove('show');

  if (!usd || usd <= 0) {
    document.getElementById('inp-usd').focus();
    return;
  }

  var sats = usdToSats(usd);
  if (sats < 1) { err.textContent = 'Amount too small.'; err.classList.add('show'); return; }

  // Show loading
  document.getElementById('pay-btn').disabled = true;
  document.getElementById('loading-wrap').classList.add('show');

  try {
    var res = await fetch(LNBITS_URL + '/api/v1/payments', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Api-Key': INVOICE_KEY
      },
      body: JSON.stringify({
        out: false,
        amount: sats,
        memo: desc,
        expiry: EXPIRY_SECS
      })
    });

    if (!res.ok) {
      var t = await res.text();
      throw new Error('Error ' + res.status + ': ' + t);
    }

    var data    = await res.json();
    var invoice = data.payment_request;

    if (!invoice || !invoice.toLowerCase().startsWith('lnbc')) {
      throw new Error('Invalid invoice returned.');
    }

    showResult(usd, sats, invoice);

  } catch(e) {
    err.textContent = e.message;
    err.classList.add('show');
    document.getElementById('pay-btn').disabled = false;
    document.getElementById('loading-wrap').classList.remove('show');
  }
}

function showResult(usd, sats, invoice) {
  currentLink = 'https://cash.app/launch/lightning/' + invoice;

  // Build QR
  var qrWrap = document.getElementById('qr-wrap');
  qrWrap.innerHTML = '';
  new QRCode(qrWrap, {
    text: invoice.toUpperCase(),
    width: 200, height: 200,
    colorDark: '#000000', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.L
  });

  document.getElementById('r-amt').textContent =
    '$' + usd.toFixed(2) + ' USD';
  document.getElementById('cashapp-link').href = currentLink;

  // Expiry
  expiryEnd = Date.now() + EXPIRY_SECS * 1000;
  if (expiryTimer) clearInterval(expiryTimer);
  expiryTimer = setInterval(tickExpiry, 1000);
  tickExpiry();

  // Switch views
  document.getElementById('input-state').style.display  = 'none';
  document.getElementById('result-state').classList.add('show');
}

function tickExpiry() {
  var rem = Math.max(0, Math.round((expiryEnd - Date.now()) / 1000));
  var m   = Math.floor(rem / 60), s = rem % 60;
  var el  = document.getElementById('expiry-cd');
  el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  el.className   = 'expiry-val' + (rem < 60 ? ' urgent' : '');
  if (rem <= 0) clearInterval(expiryTimer);
}

function resetPage() {
  if (expiryTimer) clearInterval(expiryTimer);
  document.getElementById('inp-usd').value  = '';
  document.getElementById('inp-desc').value = '';
  document.getElementById('disp-amt').textContent  = '$0';
  document.getElementById('disp-amt').className    = 'amount-big';
  document.getElementById('error-box').classList.remove('show');
  document.getElementById('pay-btn').disabled      = false;
  document.getElementById('loading-wrap').classList.remove('show');
  document.querySelectorAll('.q-btn').forEach(function(b) { b.classList.remove('sel'); });
  document.getElementById('result-state').classList.remove('show');
  document.getElementById('input-state').style.display = '';
}

fetchBtcPrice();
</script>
</body>
</html>
